<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面</title>
    <link rel="stylesheet" href="common.css">
    <script src="components.js"></script>
</head>
<body>
    <div class="container">
        <app-header></app-header>
        <app-nav current="admin"></app-nav>
        
        <div class="admin-panel">
            <div class="status-card">
                <h2>ゲーム状態管理</h2>
                <div class="status-display">
                    <span>現在の状態:</span>
                    <span id="statusBadge" class="status-badge">読み込み中...</span>
                </div>
                <div style="margin: 16px 0;">
                    <label for="problemSetSelect" style="display: block; margin-bottom: 4px; font-size: 0.9em; color: var(--color-text-secondary);">問題セット:</label>
                    <select id="problemSetSelect" style="padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 6px; background: var(--color-bg-secondary); color: var(--color-text-primary); width: 260px;"></select>
                </div>
                <div class="control-buttons">
                    <button class="btn btn-success" id="startBtn">ゲーム開始</button>
                    <button class="btn btn-danger" id="stopBtn">ゲーム終了</button>
                </div>
            </div>
            
            <div class="status-card">
                <h2>リセット</h2>
                <p style="color: var(--color-text-secondary); margin-bottom: 16px;">リーダーボードをリセットします。この操作は取り消せません。</p>
                <button class="btn btn-danger" id="resetAllBtn">全てリセット</button>
            </div>
        </div>
    </div>

    <dialog id="dlg">
        <p id="dlg-msg"></p>
        <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
            <button class="btn" id="dlg-cancel" style="display:none;" onclick="this.closest('dialog').close()">キャンセル</button>
            <button class="btn btn-primary" onclick="this.closest('dialog').close('ok')">OK</button>
        </div>
    </dialog>

    <script>
        const API_URL = '/api';

        const stored = sessionStorage.getItem('adminAuth');
        const auth = stored || (() => {
            const cred = prompt('管理者認証 (user:pass)');
            if (cred) sessionStorage.setItem('adminAuth', cred);
            return cred;
        })();

        if (!auth) {
            document.querySelector('.admin-panel').innerHTML =
                '<p style="text-align:center;padding:40px;color:var(--color-text-tertiary);">管理者認証が必要です。ページを再読み込みしてください。</p>';
            throw new Error('Not authenticated');
        }

        const ADMIN_HEADERS = { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + btoa(auth) };

        const dlg = document.getElementById('dlg');
        const dlgMsg = document.getElementById('dlg-msg');
        const dlgCancel = document.getElementById('dlg-cancel');

        function showAlert(msg) {
            dlgMsg.textContent = msg;
            dlgCancel.style.display = 'none';
            dlg.showModal();
        }

        function showConfirm(msg) {
            return new Promise(resolve => {
                dlgMsg.textContent = msg;
                dlgCancel.style.display = '';
                dlg.showModal();
                dlg.onclose = () => resolve(dlg.returnValue === 'ok');
            });
        }
        
        const statusBadge = document.getElementById('statusBadge');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');
        const problemSetSelect = document.getElementById('problemSetSelect');

        async function loadGameState() {
            try {
                const response = await fetch(`${API_URL}/game-state`);
                const data = await response.json();
                updateUI(data.is_active);
                const sets = data.problem_sets || [];
                const current = data.problem_set || '';
                if (!problemSetSelect.matches(':focus')) {
                    problemSetSelect.innerHTML = sets.map(s =>
                        `<option value="${s}"${s === current ? ' selected' : ''}>${s}</option>`
                    ).join('');
                }
            } catch (error) {
                console.error('Failed to load game state:', error);
                statusBadge.textContent = 'エラー';
                statusBadge.className = 'status-badge';
            }
        }

        function updateUI(isActive) {
            if (isActive) {
                statusBadge.textContent = '🟢 稼働中';
                statusBadge.className = 'status-badge status-active';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                statusBadge.textContent = '🔴 停止中';
                statusBadge.className = 'status-badge status-inactive';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        async function setGameState(isActive) {
            try {
                const body = { is_active: isActive, problem_set: problemSetSelect.value };
                const response = await fetch(`${API_URL}/game-state`, {
                    method: 'POST',
                    headers: ADMIN_HEADERS,
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                updateUI(data.is_active);
                showAlert(isActive ? '✅ ゲームを開始しました' : '✅ ゲームを終了しました');
            } catch (error) {
                showAlert('❌ 状態の更新に失敗しました');
            }
        }

        async function resetAll() {
            if (!await showConfirm('全てのリーダーボードをリセットしますか？\nこの操作は取り消せません。')) return;
            try {
                const response = await fetch(`${API_URL}/reset`, {
                    method: 'POST',
                    headers: ADMIN_HEADERS
                });
                if (response.ok) {
                    showAlert('✅ リーダーボードをリセットしました');
                } else {
                    showAlert('❌ リセットに失敗しました');
                }
            } catch (error) {
                showAlert('❌ リセットに失敗しました');
            }
        }

        startBtn.addEventListener('click', () => setGameState(true));
        stopBtn.addEventListener('click', () => {
            setGameState(false);
        });
        resetAllBtn.addEventListener('click', resetAll);

        loadGameState();
        setInterval(loadGameState, 5000);
    </script>
</body>
</html>
