<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Jam</title>
    <link rel="stylesheet" href="common.css">
    <script src="config.js"></script>
    <script src="components.js"></script>
</head>
<body>
    <div class="container">
        <app-header></app-header>
        <app-nav current="home"></app-nav>
        
        <div class="content">
            <div class="leaderboard">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2>リーダーボード</h2>
                    <div style="font-size: 0.85em;">
                        <span>ゲーム状態: </span>
                        <span id="gameStatus" class="status-badge">読み込み中...</span>
                    </div>
                </div>
                <div id="leaderboard-content">読み込み中...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.API_CONFIG?.url || 'http://localhost:3000';

        async function loadGameStatus() {
            try {
                const response = await fetch(`${API_URL}/game-state`);
                const data = await response.json();
                const el = document.getElementById('gameStatus');
                if (data.is_active) {
                    el.textContent = '進行中';
                    el.className = 'status-badge status-active';
                } else {
                    el.textContent = '終了';
                    el.className = 'status-badge status-inactive';
                }
            } catch (error) {
                const el = document.getElementById('gameStatus');
                el.textContent = '取得失敗';
                el.className = 'status-badge';
            }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/leaderboard`);
                const data = await response.json();
                const container = document.getElementById('leaderboard-content');
                container.textContent = '';

                const entries = data.leaderboard || [];
                const problemIds = data.problem_ids || [];

                if (entries.length === 0) {
                    const div = document.createElement('div');
                    div.style.cssText = 'text-align: center; padding: 40px; color: var(--color-text-tertiary);';
                    div.textContent = 'まだ提出がありません。最初の挑戦者になりましょう！';
                    container.appendChild(div);
                    return;
                }

                const table = document.createElement('table');
                const headerRow = document.createElement('tr');
                ['順位', 'ユーザー名', ...problemIds].forEach(text => {
                    const th = document.createElement('th');
                    th.textContent = text;
                    headerRow.appendChild(th);
                });
                table.appendChild(headerRow);

                entries.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    const rankTd = document.createElement('td');
                    rankTd.textContent = index + 1;
                    row.appendChild(rankTd);
                    const nameTd = document.createElement('td');
                    nameTd.textContent = entry.username;
                    row.appendChild(nameTd);
                    problemIds.forEach(pid => {
                        const td = document.createElement('td');
                        td.textContent = entry[pid] || '-';
                        row.appendChild(td);
                    });
                    table.appendChild(row);
                });

                container.appendChild(table);
            } catch (error) {
                document.getElementById('leaderboard-content').textContent = 'リーダーボードの読み込みに失敗しました';
            }
        }

        loadGameStatus();
        loadLeaderboard();
        setInterval(() => {
            loadGameStatus();
            loadLeaderboard();
        }, 5000);
    </script>
</body>
</html>
